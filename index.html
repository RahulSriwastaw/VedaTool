    <script>
      // Polyfill to prevent "Cannot set property fetch of #<Window> which has only a getter"
      // Some UI libraries or OCR packages try to assign `export fetch = ...` causing crashes.
      if (typeof window !== 'undefined') {
        const originalFetch = window.fetch;
        const fetchDescriptor = {
          configurable: true,
          enumerable: true,
          get: function() { return originalFetch; },
          set: function(val) { /* ignore or store if needed, but doing nothing prevents the crash */ }
        };
        Object.defineProperty(window, 'fetch', fetchDescriptor);
        if (typeof globalThis !== 'undefined') {
          try { Object.defineProperty(globalThis, 'fetch', fetchDescriptor); } catch(e){}
        }
      }
    </script>

    <!-- Synchronously load properties for secure dynamic Firebase initialization -->
    <script>
      (function() {
        try {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", "/api/firebase-config", false);
          xhr.send(null);
          if (xhr.status === 200) {
            var text = xhr.responseText.trim();
            if (text.startsWith("<")) {
              console.warn("Received HTML fallback from config, bypassing parse.");
            } else {
              window.__FIREBASE_CONFIG__ = JSON.parse(text);
            }
          } else {
            console.error("Failed to load dynamic Firebase config:", xhr.statusText);
          }
        } catch (err) {
          console.error("Failed to fetch secure Firebase config:", err);
        }
      })();
    </script>
